<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETU — Hub-and-Spoke IVF Network (Prototype)</title>
<style>
 
  :root{ --teal:#16807c; --deep:#0f5f5c; --ink:#1d2b31; --soft:#6a868d; --bg:#eef3f3; --card:#fff; --border:#e2eaea; --line:#eef2f2; --pale:#e7f1f0; --danger:#b23b2e; --amber:#9a6b14; --amberbg:#fbf2e0; --green:#2f8f5b; --greenbg:#e6f4ec; --nav-h:64px; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  .num{font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  img{max-width:100%;}
  .topbar{position:sticky;top:0;z-index:60;height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#2f7e84,#1c5f63);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;}
  .brand b{font-size:16px;font-weight:800;display:block;line-height:1.05;}
  .brand .brandsub{font-size:10px;color:var(--soft);}
  .tourtop{margin-left:auto;background:var(--teal);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px;flex:none;min-height:40px;}
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:55;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(20,40,45,.06);}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 4px;color:var(--soft);min-height:60px;}
  .tabbar button .ti{font-size:20px;line-height:1;}
  .tabbar button .tl{font-size:10.5px;font-weight:600;}
  .tabbar button.on{color:var(--teal);}
  .wrap{max-width:100%;padding:16px 16px calc(var(--nav-h) + 24px);margin:0 auto;}
  .eyebrow{font-size:10.5px;letter-spacing:1.3px;color:var(--teal);font-weight:700;text-transform:uppercase;}
  h1.page{font-size:22px;font-weight:800;margin:3px 0 2px;}
  .sub{color:var(--soft);font-size:13.5px;margin-bottom:16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .divider{height:1px;background:var(--border);margin:13px 0;}
  .muted{color:var(--soft);font-size:12.5px;}
  .grid2,.grid3{display:grid;grid-template-columns:1fr;gap:12px;}
  .btn{background:var(--teal);color:#fff;font-weight:700;padding:12px 18px;border-radius:10px;font-size:14.5px;min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn.ghost{background:#fff;color:var(--soft);border:1px solid var(--border);}
  .btn.deep{background:var(--deep);}
  .btn:disabled{opacity:.5;}
  input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:15px;margin-top:5px;background:#fff;font-family:inherit;}
  label{font-size:12.5px;color:var(--soft);font-weight:600;}
  .field{margin-bottom:14px;}
  .demo-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--amber);background:var(--amberbg);padding:3px 8px;border-radius:10px;letter-spacing:.4px;}
  .chip{display:inline-block;font-size:11.5px;padding:4px 10px;border-radius:12px;background:var(--pale);color:var(--deep);font-weight:600;margin:3px 4px 3px 0;}
  .chip.red{background:#f7eae8;color:var(--danger);} .chip.green{background:var(--greenbg);color:var(--green);} .chip.amber{background:var(--amberbg);color:var(--amber);}
  .searchbox{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .searchbox input{margin-top:0;} .searchbox .btn{width:100%;}
  .presult{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .presult .btn{width:100%;margin-top:6px;}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--pale);color:var(--deep);display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;}
  .upzone{border:2px dashed #cdd9d9;border-radius:14px;padding:28px 16px;text-align:center;color:var(--soft);background:#fbfdfd;}
  .filechip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:#f4f8f8;border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin:4px 4px 0 0;}
  .scan{height:7px;border-radius:4px;background:linear-gradient(90deg,var(--teal),#5fd0c9);width:0;transition:width .1s;}
  .console{display:grid;grid-template-columns:1fr;gap:12px;}
  .rail .card{margin-bottom:12px;}
  .ch{font-size:10.5px;color:var(--soft);letter-spacing:.5px;margin-bottom:9px;text-transform:uppercase;font-weight:700;}
  .kv{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .kv:last-child{border:none;} .kv .k{color:var(--soft);} .kv .v{font-weight:600;text-align:right;}
  .kv .v.flag{color:var(--amber);} .kv .v.ok{color:var(--green);}
  .pstrip{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .pname{font-size:17px;font-weight:700;} .pmeta{color:var(--soft);font-size:12.5px;width:100%;}
  .ph{font-size:11px;color:var(--soft);letter-spacing:.4px;margin-bottom:9px;text-transform:uppercase;font-weight:700;}
  .paramgrid{display:flex;flex-wrap:wrap;}
  .pcell{width:50%;padding:8px 12px 8px 0;}
  .pcell .lab{font-size:11.5px;color:var(--soft);} .pcell .val{font-size:17px;font-weight:700;}
  .pcell .val u{font-size:11px;font-weight:500;color:var(--soft);text-decoration:none;margin-left:2px;}
  .pcell .ref{font-size:10.5px;color:#9fb2b5;margin-left:4px;}
  .pcell.flag .val{color:var(--amber);}
  .three{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
  .ic{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 15px;}
  .ic.diag{border-left:4px solid var(--teal);} .ic.tx{border-left:4px solid var(--deep);}
  .icn{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .icn .n{width:20px;height:20px;border-radius:50%;background:var(--teal);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
  .icn h3{font-size:13.5px;} .ic p,.ic li{font-size:13px;line-height:1.5;color:#34474d;margin-bottom:6px;}
  .ic ul{list-style:none;} .ic li{padding-left:16px;position:relative;} .ic li b{color:var(--ink);}
  .ic li .s{position:absolute;left:0;color:var(--teal);font-weight:700;}
  .foot{display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px 16px;margin-top:12px;}
  .foot .ring{flex:none;}
  .foot > div:nth-child(2){flex:1;min-width:140px;}
  .foot > div:last-child{width:100%;display:flex;gap:10px;}
  .foot > div:last-child .btn{flex:1;}
  .ring{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--green);}
  .voice{background:#0f3b3e;border-radius:14px;padding:16px;color:#dff0ef;margin-bottom:12px;}
  .voice h3{color:#fff;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pipeline{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
  .stage{background:#123f42;border-radius:10px;padding:10px 11px;font-size:11px;opacity:.4;transition:.3s;border:1px solid #1c5153;}
  .stage.active{opacity:1;background:#16807c;border-color:#5fd0c9;} .stage.done{opacity:1;background:#123f42;border-color:#2f8f5b;}
  .stage b{color:#fff;display:block;font-size:12px;margin-bottom:2px;}
  .wave{display:inline-flex;gap:3px;align-items:flex-end;height:16px;}
  .wave span{width:3px;background:#5fd0c9;border-radius:2px;animation:w 1s infinite;}
  @keyframes w{0%,100%{height:4px}50%{height:16px}}
  .transcript{background:#0b2e30;border-radius:10px;padding:12px;margin-top:8px;max-height:260px;overflow:auto;}
  .tline{margin-bottom:10px;font-size:13px;}
  .tline .who{font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
  .tline .who.doc{color:#7fd6cf;} .tline .who.pat{color:#f0c66b;}
  .tline .orig{color:#8fb4b3;} .tline .eng{color:#eafffe;}
  .recbtn{background:#c0392b;color:#fff;font-weight:700;padding:12px 18px;border-radius:10px;font-size:14px;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;min-height:48px;}
  .recbtn.rec{background:#123f42;border:1px solid #5fd0c9;}
  .stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;}
  .stat .lab{font-size:12px;color:var(--soft);} .stat .big{font-size:26px;font-weight:800;margin:4px 0;}
  .stat .tr{font-size:12px;color:var(--green);font-weight:600;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px;}
  th{text-align:left;color:var(--soft);font-weight:700;font-size:11px;text-transform:uppercase;padding:10px;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr.clk:active{background:#f7fbfb;}
  .status{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;}
  .status.pend{background:var(--amberbg);color:var(--amber);} .status.appr{background:var(--greenbg);color:var(--green);} .status.act{background:#f7eae8;color:var(--danger);}
  .steps{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .stepn{flex:1;min-width:130px;text-align:center;padding:11px 10px;border-radius:10px;background:#fff;border:1px solid var(--border);font-size:12.5px;color:var(--soft);white-space:nowrap;}
  .stepn.on{background:var(--deep);color:#fff;font-weight:700;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,40,45,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
  .modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));width:100%;max-height:92vh;overflow:auto;}
  .sim{position:fixed;right:12px;bottom:calc(var(--nav-h) + 12px);z-index:58;background:#0f3b3e;color:#dff0ef;border-radius:14px;padding:12px 14px;width:232px;box-shadow:0 10px 30px rgba(0,0,0,.28);font-size:12px;}
  .sim h4{color:#fff;font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer;}
  .sim .row{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;margin:8px 0;gap:8px;}
  .toggle{background:#123f42;border:1px solid #2c6d6f;color:#dff0ef;font-size:11px;padding:7px 11px;border-radius:8px;min-height:34px;}
  .toggle.on{background:#16807c;border-color:#5fd0c9;color:#fff;}
  .sim .collapsed{display:none;}
  .tour-ov{position:fixed;inset:0;background:rgba(15,30,34,.55);z-index:300;}
  .tour-card{position:fixed;z-index:302;background:#fff;border-radius:16px;padding:18px;box-shadow:0 14px 40px rgba(0,0,0,.32);left:12px;right:12px;bottom:calc(var(--nav-h) + 12px);}
  .tour-card .tc-step{font-size:11px;color:var(--teal);font-weight:700;letter-spacing:1px;}
  .tour-card h4{font-size:17px;margin:5px 0 8px;}
  .tour-card p{font-size:14px;color:#425a60;line-height:1.5;margin-bottom:14px;}
  .tour-card .tc-btns{display:flex;gap:8px;align-items:center;}
  .tour-card .tc-btns .btn{padding:10px 14px;font-size:13px;min-height:42px;}
  .spot{position:relative;z-index:301;box-shadow:0 0 0 4px #5fd0c9,0 0 0 9999px rgba(15,30,34,.55);border-radius:12px;}
  @media(min-width:900px){
    body{font-size:14px;}
    .topbar{height:60px;padding:0 22px;}
    .tabbar{position:sticky;top:60px;bottom:auto;left:auto;right:auto;z-index:40;border-top:none;border-bottom:1px solid var(--border);padding:0 18px;box-shadow:none;justify-content:flex-start;gap:4px;}
    .tabbar button{flex:0 0 auto;flex-direction:row;gap:7px;min-height:0;padding:13px 14px;position:relative;}
    .tabbar button .ti{font-size:16px;} .tabbar button .tl{font-size:14px;font-weight:600;}
    .tabbar button.on{color:var(--ink);}
    .tabbar button.on::after{content:'';position:absolute;left:14px;right:14px;bottom:0;height:3px;background:var(--teal);border-radius:3px;}
    .wrap{max-width:1180px;padding:22px 22px 44px;}
    h1.page{font-size:26px;}
    .grid2{grid-template-columns:1fr 1fr;gap:14px;}
    .grid3{grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .console{grid-template-columns:300px 1fr;gap:14px;}
    .three{grid-template-columns:1fr 1fr 1fr;}
    .pcell{width:33.33%;}
    .pipeline{grid-template-columns:1fr 1fr 1fr 1fr;}
    .searchbox{flex-direction:row;} .searchbox .btn{width:auto;}
    .presult .btn{width:auto;margin-top:0;}
    .foot > div:last-child{width:auto;margin-left:auto;} .foot > div:last-child .btn{flex:0 0 auto;}
    .recbtn{width:auto;}
    table{min-width:0;}
    .modal-bg{align-items:center;} .modal{border-radius:18px;width:560px;max-width:92vw;}
    .sim{bottom:20px;right:20px;width:270px;}
    .tour-card{width:340px;left:auto;right:auto;}
    .stepn{flex:0 0 auto;min-width:0;}
  }
 
 
  /* ---- auth / login ---- */
  body:not(.authed) .topbar, body:not(.authed) .tabbar, body:not(.authed) #app, body:not(.authed) .sim{display:none!important;}
  #login{position:fixed;inset:0;z-index:400;background:linear-gradient(160deg,#0f3b3e,#0b2e30);display:none;align-items:center;justify-content:center;padding:20px;}
  body.guest #login{display:flex;}
  .logincard{background:#fff;border-radius:18px;padding:26px 22px;width:360px;max-width:94vw;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .lg-logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#2f7e84,#1c5f63);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:14px;}
  .logincard h2{font-size:20px;margin-bottom:3px;} .lg-sub{color:var(--soft);font-size:13px;margin-bottom:18px;}
  .demo-note{background:var(--amberbg);color:var(--amber);font-size:12px;font-weight:600;padding:9px 11px;border-radius:9px;margin-top:14px;line-height:1.5;}
  .lg-err{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:16px;}
  #userbox{display:flex;align-items:center;gap:10px;}
  .userchip{font-size:12px;color:var(--soft);} .userchip b{color:var(--ink);} .userchip .rl{text-transform:capitalize;}
  .logoutbtn{background:#fff;border:1px solid var(--border);color:var(--soft);font-size:12px;padding:8px 11px;border-radius:9px;font-weight:600;}
 
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">SE</div>
  <div class="brand"><b>SETU</b><span class="brandsub">Hub-and-Spoke IVF</span></div>
  <button class="tourtop" onclick="startTour()">▶ Tour</button>
<div id="userbox"></div>
</header>
<div id="login">
  <div class="logincard">
    <div class="lg-logo">SE</div>
    <h2>Sign in to SETU</h2>
    <div class="lg-sub">Staff access · phone + OTP</div>
    <div id="lg-step1">
      <div class="field"><label>Phone number</label><input id="lg-phone" inputmode="numeric" placeholder="10-digit mobile"></div>
      <button class="btn" style="width:100%" onclick="doRequestOtp()">Send OTP</button>
    </div>
    <div id="lg-step2" style="display:none">
      <div class="field"><label>Enter OTP</label><input id="lg-otp" inputmode="numeric" placeholder="6-digit code" maxlength="6"></div>
      <button class="btn" style="width:100%" onclick="doVerifyOtp()">Verify & sign in</button>
      <button class="btn ghost" style="width:100%;margin-top:8px" onclick="lgBack()">← Change number</button>
    </div>
    <div class="lg-err" id="lg-err"></div>
    <div class="demo-note">Demo mode: OTP is <b>123456</b> (no SMS sent).<br>Seeded admin: <b>7016416673</b> (Shaurya).</div>
  </div>
</div>
<nav class="tabbar" id="nav">
  <button data-m="onboarding"><span class="ti">🏥</span><span class="tl">Clinics</span></button>
  <button data-m="reception"><span class="ti">📋</span><span class="tl">Front Desk</span></button>
  <button data-m="doctor" class="on"><span class="ti">🩺</span><span class="tl">Doctor</span></button>
  <button data-m="hub"><span class="ti">🏨</span><span class="tl">Hub</span></button>
</nav>
<main id="app" class="wrap"></main>
 
<!-- Simulation panel -->
<div class="sim" id="sim">
  <h4 onclick="toggleSim()" style="cursor:pointer">● SETU Developer Simulation Engine ▾</h4>
  <div id="simbody">
    <div class="row"><span>Staff layout</span>
      <button class="toggle on" id="tgStaff" onclick="toggleStaff()">Team</button></div>
    <div class="row"><span>Records completeness</span>
      <button class="toggle on" id="tgRec" onclick="toggleRecords()">Complete</button></div>
    <div class="row"><span>Hub — inject 50 referrals</span>
      <button class="toggle" onclick="injectReferrals()">Inject</button></div>
    <div class="row"><span>Reset demo</span>
      <button class="toggle" onclick="location.reload()">Reset</button></div>
  </div>
</div>

function runVoice(){
  if(S.voiceRun) return; S.voiceRun=true;
  const btn=document.getElementById('recbtn'); btn.className='recbtn rec';
  btn.innerHTML=`<span class="wave"><span style="animation-delay:0s"></span><span style="animation-delay:.2s"></span><span style="animation-delay:.4s"></span><span style="animation-delay:.1s"></span></span> Recording… WhisperFlow`;
  const out=document.getElementById('voiceout');
  out.innerHTML=`<div class="transcript" id="tr"></div>`;
  const tr=document.getElementById('tr');
  setStage('st1','active');
  let i=0;
  const step=()=>{
    if(i<CONVO.length){
      const c=CONVO[i];
      const div=document.createElement('div'); div.className='tline';
      div.innerHTML=`<div class="who ${c.who}">${c.who==='doc'?'Doctor':'Patient'}</div><div class="orig">🇮🇳 ${c.orig}</div><div class="eng">${i>0?'⟶ '+c.eng:'⟶ translating…'}</div>`;
      tr.appendChild(div); tr.scrollTop=tr.scrollHeight;
      if(i===0){ setStage('st1','done'); setStage('st2','active'); }
      // fill english (Sarvam) shortly after
      setTimeout(()=>{ div.querySelector('.eng').innerHTML='⟶ '+c.eng; },300);
      i++; setTimeout(step,750);
    } else { finishVoice(); }
  };
  setTimeout(step,500);
}

    if(target){ target.classList.add('spot'); lastSpot=target; target.scrollIntoView({behavior:'smooth',block:'center'}); }
    tourCard.innerHTML=`<div class="tc-step">STEP ${tourIdx+1} / ${TOUR.length}</div><h4>${step.title}</h4><p>${step.body}</p>
      <div class="tc-btns">${tourIdx>0?'<button class="btn ghost" onclick="tourPrev()">← Back</button>':''}
      <button class="btn" onclick="tourNext()">${tourIdx===TOUR.length-1?'Finish ✓':'Next →'}</button>
      <button class="btn ghost" style="margin-left:auto" onclick="endTour()">Skip</button></div>`;
    positionCard(target);
  },step.m!==S.module?260:60);
}
function positionCard(target){
  if(window.innerWidth<900){ tourCard.style.transform='none'; tourCard.style.left='12px'; tourCard.style.right='12px'; tourCard.style.width='auto'; tourCard.style.top='auto'; tourCard.style.bottom='calc(var(--nav-h) + 12px)'; return; }
  tourCard.style.bottom='auto'; tourCard.style.right='auto'; tourCard.style.width='340px'; tourCard.style.transform='none';
  if(!target){ tourCard.style.top='50%'; tourCard.style.left='50%'; tourCard.style.transform='translate(-50%,-50%)'; return; }
  const r=target.getBoundingClientRect(); const cw=340, ch=tourCard.offsetHeight||200;
  let top=r.bottom+14, left=r.left;
  if(top+ch>window.innerHeight-10) top=Math.max(70,r.top-ch-14);
  if(left+cw>window.innerWidth-10) left=window.innerWidth-cw-14;
  tourCard.style.top=top+'px'; tourCard.style.left=Math.max(10,left)+'px';
}
function tourNext(){ if(tourIdx<TOUR.length-1){ tourIdx++; showTourStep(); } else endTour(); }
function tourPrev(){ if(tourIdx>0){ tourIdx--; showTourStep(); } }
function endTour(){ tourActive=false; if(lastSpot)lastSpot.classList.remove('spot'); if(tourOv)tourOv.remove(); if(tourCard)tourCard.remove(); }
 
/* ---------------- INIT ---------------- */
render();
if(window.innerWidth<900){ var sb=document.getElementById('simbody'); if(sb) sb.classList.add('collapsed'); }
</script>
<script>
/* ============ LIVE AI WIRING (calls the /api serverless routes) ============ */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function fileToB64(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(String(r.result).split(',')[1]);}; r.onerror=rej; r.readAsDataURL(file); }); }
 
/* --- Doctor: real diagnosis via Claude (/api/analyze-case) --- */
function livePatientPayload(){
  var p=PATIENTS[S.patient];
  var hist={}; Object.entries(p.history).forEach(function(e){ hist[e[0]]=Array.isArray(e[1])?e[1][0]:e[1]; });
  return { age:p.age, partnerAge:p.partnerAge, bmi:p.bmi, complaint:p.complaint, married:p.married,
    history:hist, labs:p.labs.map(function(l){return {name:l[0],value:l[1],unit:l[2],ref:l[3]};}), hsg:p.hsg };
}
function renderLiveDx(j){
  var tests=(j.testsRequired||[]).map(function(t){ var dot=t.status==='missing'?'\U0001F534':(t.status==='advised'?'\U0001F7E0':'\U0001F7E2'); return '<div style="font-size:12.5px;margin-bottom:6px">'+dot+' <b>'+escapeHtml(t.name||'')+'</b> '+escapeHtml(t.note||'')+'</div>'; }).join('');
  var tx=(j.treatment||[]).map(function(x,i){ return '<li><span class="s">'+(i+1)+'.</span>'+escapeHtml(x)+'</li>'; }).join('');
  var flags=(j.redFlags&&j.redFlags.length)?'<p><b>Red flags:</b> '+j.redFlags.map(escapeHtml).join(', ')+'</p>':'';
  return '<div class="three">'
    +'<div class="ic"><div class="icn"><span class="n">1</span><h3>Tests Required</h3><span class="chip green">\u25CF live</span></div>'+(tests||'<div class="muted">\u2014</div>')+'</div>'
    +'<div class="ic diag"><div class="icn"><span class="n">2</span><h3>Diagnosis</h3></div><p>'+escapeHtml(j.diagnosis||'')+'</p>'+flags+'<p class="muted">Locus: <b>'+escapeHtml(j.locus||'')+'</b> \u00B7 '+escapeHtml(j.referral||'')+(j.timeSensitive?' \u00B7 \u23F1 time-sensitive':'')+'</p></div>'
    +'<div class="ic tx"><div class="icn"><span class="n">3</span><h3>Recommended Treatment</h3><span class="chip">live \u00B7 provisional</span></div><ul>'+tx+'</ul></div>'
    +'</div>';
}
function liveDiagnose(){
  var el=document.getElementById('intelligence'); if(!el) return;
  var p=PATIENTS[S.patient];
  if(p && p._caseId){
    el.innerHTML='<div class="card">\u26A1 Fusing this case (records + conversation + history + thresholds)\u2026</div>';
    apiSend('/api/cases/'+p._caseId+'/analyze','POST',{}).then(function(j){
      if(j.error){ el.innerHTML='<div class="card" style="border-left:4px solid var(--danger)"><b>Live AI error.</b><div class="muted">'+escapeHtml(j.error)+'</div></div>'; return; }
      var v=j.verdict||{}; el.innerHTML=renderLiveDx(v)+(v.fusionNote?'<div class="muted" style="margin-top:8px"><b>Fusion:</b> '+escapeHtml(v.fusionNote)+'</div>':'')+'<div class="chip green" style="margin-top:6px">\u2713 verdict saved to case</div>';
    }).catch(function(e){ el.innerHTML='<div class="card">Live AI unavailable ('+escapeHtml(String(e))+').</div>'; });
    return;
  }
  var records={ labs:(p.labs||[]).map(function(l){return {name:l[0],value:l[1],unit:l[2],ref:l[3],flag:l[4]===1?1:0};}), hsg:p.hsg };
  var hist={}; Object.entries(p.history).forEach(function(e){ hist[e[0]]=Array.isArray(e[1])?e[1][0]:e[1]; });
  var payload={ records:records, history:hist, conversation:(window.LIVE_CONVO||null), patient:{age:p.age,partnerAge:p.partnerAge,bmi:p.bmi,complaint:p.complaint} };
  el.innerHTML='<div class="card">\u26A1 Claude is fusing records + conversation + history\u2026</div>';
  fetch('/api/analyze-case',{method:'POST',headers:authHeaders(),body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(j){
      if(j.error){ el.innerHTML='<div class="card" style="border-left:4px solid var(--danger)"><b>Live AI error.</b><div class="muted">'+escapeHtml(j.error)+'</div></div>'; return; }

    })

}
 
/* --- Reception: real report reading via Claude vision (/api/extract-report) --- */
function liveExtract(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var out=document.getElementById('liveExtractOut');
  out.innerHTML='<div class="muted">\u26A1 Claude is reading '+escapeHtml(file.name)+'\u2026</div>';
  fileToB64(file).then(function(b64){
    return fetch('/api/extract-report',{method:'POST',headers:authHeaders(),body:JSON.stringify({imageBase64:b64,mediaType:file.type})});
  }).then(function(r){return r.json();}).then(function(j){
    if(j.error){ out.innerHTML='<div class="muted" style="color:var(--danger)">Error: '+escapeHtml(j.error)+'</div>'; return; }
    window.LAST_EXTRACT={labs:j.labs||[],hsg:j.hsg||null};
    var labs=(j.labs||[]).map(function(l){ return '<span class="chip '+(l.flag?'amber':'')+'">'+escapeHtml(l.name)+': '+escapeHtml(String(l.value))+' '+escapeHtml(l.unit||'')+'</span>'; }).join('');
    out.innerHTML='<div class="ph" style="margin-top:6px">Claude extracted <span class="demo-tag" style="color:var(--green);background:var(--greenbg)">\u25CF live</span></div>'
      +(labs||'<span class="muted">No fertility values detected in this file.</span>')
      +(j.hsg?'<div style="margin-top:8px;font-size:13px"><b>HSG:</b> '+escapeHtml(j.hsg)+'</div>':'')
      +'<div style="margin-top:12px"><button class="btn" style="width:100%" onclick="saveCaseFromExtract()">Save + send to doctor\u2019s queue \u2192</button></div>';
  }).catch(function(e){ out.innerHTML='<div class="muted" style="color:var(--danger)">Live extract failed: '+escapeHtml(String(e))+'</div>'; });
}
 
/* --- Doctor: real voice via Sarvam + Claude (/api/transcribe, /api/analyze-conversation) --- */
var _mediaRec=null, _chunks=[];
function liveRecord(btn){
  if(_mediaRec && _mediaRec.state==='recording'){ _mediaRec.stop(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ alert('This browser has no mic recording support. Use the demo button.'); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    _chunks=[]; _mediaRec=new MediaRecorder(stream);
    _mediaRec.ondataavailable=function(e){ _chunks.push(e.data); };
    _mediaRec.onstop=function(){
      stream.getTracks().forEach(function(t){t.stop();});
      btn.textContent='\u25CF Record LIVE (mic \u2192 Sarvam + Claude)'; btn.style.background='#123f42';
      var out=document.getElementById('voiceout'); out.innerHTML='<div class="transcript"><div class="muted">\u26A1 Sarvam transcribing + translating\u2026</div></div>';
      var blob=new Blob(_chunks,{type:'audio/webm'});
      fileToB64(blob).then(function(b64){
        return fetch('/api/transcribe',{method:'POST',headers:authHeaders(),body:JSON.stringify({audioBase64:b64,mimeType:'audio/webm'})});
      }).then(function(r){return r.json();}).then(function(j){
        if(j.error){ out.innerHTML='<div class="transcript" style="color:#f0c66b">Sarvam error: '+escapeHtml(j.error)+'</div>'; return; }
        out.innerHTML='<div class="transcript"><div class="tline"><div class="who pat">Translated'+(j.language?' \u00B7 '+escapeHtml(j.language):'')+'</div><div class="eng">'+escapeHtml(j.english||'(no speech detected)')+'</div></div></div>';
        return fetch('/api/analyze-conversation',{method:'POST',headers:authHeaders(),body:JSON.stringify({transcript:j.english})}).then(function(r){return r.json();}).then(function(j2){
          if(j2 && j2.findings){ window.LIVE_CONVO={findings:j2.findings,mergeNote:j2.mergeNote,transcript:j.english,demographics:j2.demographics,history:j2.history,source:'live consultation'}; saveConversationToCase(j.english,j2); out.innerHTML+='<div style="margin-top:10px" class="ph">Findings \u00B7 Claude</div>'+(j2.findings||[]).map(function(fd){return '<span class="chip">'+escapeHtml(fd)+'</span>';}).join('')+(j2.mergeNote?'<div class="muted" style="margin-top:6px">'+escapeHtml(j2.mergeNote)+'</div>':''); }
        });
      }).catch(function(e){ out.innerHTML='<div class="transcript" style="color:#f0c66b">Live voice failed: '+escapeHtml(String(e))+'</div>'; });
    };
    _mediaRec.start();
    btn.textContent='\u25A0 Stop recording (live)'; btn.style.background='#c0392b';
  }).catch(function(e){ alert('Mic permission needed for live recording. Use the demo button instead.\n'+e); });
}
</script>

}
function runCaseAnalyze(id){
  var r=document.getElementById('ovlres'); if(r) r.innerHTML='<div class="muted">\u26A1 Fusing records + conversation + history for this case\u2026</div>';
  apiSend('/api/cases/'+id+'/analyze','POST',{}).then(function(j){
    if(j.error){ if(r) r.innerHTML='<div class="muted" style="color:var(--danger)">'+escapeHtml(j.error)+'</div>'; return; }
    var v=j.verdict||{}; if(r) r.innerHTML='<div class="card"><b>'+escapeHtml(v.diagnosis||'')+'</b><div class="muted" style="margin-top:4px">Locus: '+escapeHtml(v.locus||'')+' \u00B7 '+escapeHtml(v.referral||'')+'</div>'+(v.fusionNote?'<div class="muted" style="margin-top:4px"><b>Fusion:</b> '+escapeHtml(v.fusionNote)+'</div>':'')+'<div class="chip green" style="margin-top:6px">\u2713 verdict saved to case</div></div>';
  }).catch(function(e){ if(r) r.innerHTML='<div class="muted" style="color:var(--danger)">'+escapeHtml(String(e))+'</div>'; });
}
</script>
<script>
/* ================= AUTH (demo OTP) + role routing ================= */
var SESSION=null, _lgphone='';
function authHeaders(){ return {'content-type':'application/json', Authorization:'Bearer '+((SESSION&&SESSION.token)||'')}; }
function _esc(s){ return (typeof escapeHtml==='function')?escapeHtml(s):String(s); }
function lgErr(m){ var e=document.getElementById('lg-err'); if(e) e.textContent=m||''; }
function doRequestOtp(){
  _lgphone=(document.getElementById('lg-phone').value||'').trim(); lgErr('');
  if(_lgphone.replace(/\D/g,'').length<10){ lgErr('Enter a valid 10-digit number'); return; }
  fetch('/api/auth/request-otp',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({phone:_lgphone})})
    .then(function(r){return r.json();}).then(function(j){
      if(j && j.error){ lgErr(j.error); return; }
      document.getElementById('lg-step1').style.display='none';
      document.getElementById('lg-step2').style.display='block';
      var o=document.getElementById('lg-otp'); if(o) o.focus();
    }).catch(function(){ lgErr('Network error \u2014 is the app deployed?'); });
}
function lgBack(){ document.getElementById('lg-step2').style.display='none'; document.getElementById('lg-step1').style.display='block'; lgErr(''); }
function doVerifyOtp(){
  var code=(document.getElementById('lg-otp').value||'').trim(); lgErr('');
  fetch('/api/auth/verify-otp',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({phone:_lgphone,code:code})})
    .then(function(r){return r.json();}).then(function(j){
      if(j && j.error){ lgErr(j.error); return; }
      SESSION={token:j.token, profile:j.profile};
      try{ localStorage.setItem('setu_session', JSON.stringify(SESSION)); }catch(_){}
      enterApp();
    }).catch(function(){ lgErr('Network error'); });
}
function logout(){ SESSION=null; try{localStorage.removeItem('setu_session');}catch(_){}
  document.body.classList.remove('authed'); document.body.classList.add('guest');
  var s1=document.getElementById('lg-step1'), s2=document.getElementById('lg-step2');
  if(s1) s1.style.display='block'; if(s2) s2.style.display='none';
  var op=document.getElementById('lg-otp'); if(op) op.value='';
}
var ROLE_TABS={ admin:['onboarding','reception','doctor','hub'], receptionist:['reception'], gp:['doctor'], specialist:['hub'], counselor:['hub'] };
var ROLE_LAND={ admin:'doctor', receptionist:'reception', gp:'doctor', specialist:'hub', counselor:'hub' };
function enterApp(){
  if(!SESSION||!SESSION.profile){ document.body.classList.add('guest'); return; }
  document.body.classList.remove('guest'); document.body.classList.add('authed');
  var role=SESSION.profile.role, allowed=ROLE_TABS[role]||['doctor'];
  document.querySelectorAll('#nav button').forEach(function(b){ b.style.display = allowed.indexOf(b.dataset.m)>=0 ? '' : 'none'; });
  var ub=document.getElementById('userbox');
  if(ub) ub.innerHTML='<span class="userchip"><b>'+_esc(SESSION.profile.name)+'</b> \u00B7 <span class="rl">'+_esc(role)+'</span></span><button class="logoutbtn" onclick="logout()">Log out</button>';
  var sim=document.querySelector('.sim'); if(sim) sim.style.display = role==='admin' ? '' : 'none';
  if(role==='specialist') S.hubTab='approvals';
  if(role==='counselor') S.hubTab='onboarding';
  go(ROLE_LAND[role]||'doctor');
}
(function bootAuth(){
  try{ var raw=localStorage.getItem('setu_session'); if(raw){ SESSION=JSON.parse(raw); } }catch(_){}
  if(SESSION && SESSION.token){ enterApp(); } else { document.body.classList.add('guest'); }
})();
</script>
</body>
